  <style>
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      -webkit-tap-highlight-color: transparent;
    }
    a { color: inherit; text-decoration: inherit; font-size: inherit; }
    .w-webflow-badge { display: none !important; }

    html, body {
      margin: 0;
      padding: 0;
      background-color: #f7f0cb;
      min-height: 100vh;
      font-size: 1vw;
      font-family: TeX Gyre Heros Condensed, sans-serif;
      line-height: 1.1;
      color: #000;
    }

    /* ---- Nav ---- */
    .notes-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.32em;
      background: transparent;
    }
    .notes-nav-left {
      display: flex;
      flex-direction: column;
      gap: .5em;
    }
    .notes-nav-link {
      text-transform: uppercase;
      font-family: TeX Gyre Heros Condensed, sans-serif;
      font-size: .99em;
      line-height: 1.13;
      display: block;
      color: #000;
      text-decoration: none;
    }
    .notes-nav-link.is-current {
      font-style: italic;
    }
    .notes-nav-right {
      text-align: right;
    }

    /* ---- Logo ---- */
    .notes-logo {
      position: fixed;
      bottom: 1.32em;
      left: 1.32em;
      right: 1.32em;
      z-index: 200;
      display: flex;
      align-items: flex-end;
      pointer-events: none;
    }
    .notes-logo a {
      pointer-events: auto;
    }
    .notes-logo svg {
      width: 100%;
      height: auto;
      max-height: 5.3em;
    }

    /* ---- Ticker banner ---- */
    .notes-ticker-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      overflow: hidden;
      background: #f7f0cb;
      padding-top: 10em;
      padding-bottom: 1em;
    }
    .notes-ticker-track {
      display: flex;
      width: max-content;
      animation: notes-ticker 18s linear infinite;
    }
    .notes-ticker-track:hover {
      animation-play-state: paused;
    }
    .notes-ticker-item {
      font-family: Larish Alte, sans-serif;
      font-size: 16.53em;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      padding-right: .25em;
      color: #000;
    }
    @keyframes notes-ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ---- List content ---- */
    .notes-page {
      padding: 2em 3em 10em;
      max-width: 100%;
      box-sizing: border-box;
    }

    .notes-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .notes-item {
      border-top: 2px solid #000;
      padding: 1em 0;
      display: flex;
      flex-direction: column;
      gap: .3em;
    }

    .notes-item:last-child {
      border-bottom: 2px solid #000;
    }

    .notes-item-date {
      font-family: TeX Gyre Heros Condensed, sans-serif;
      font-size: 1em;
      color: #000;
      opacity: 0.6;
      line-height: 1.1;
    }

    .notes-item-link {
      font-family: ITC Garamond Std, sans-serif;
      font-size: 3.2em;
      font-weight: 400;
      line-height: 1;
      color: #000;
      text-decoration: none;
    }

    .notes-item-link:hover {
      text-decoration: underline;
    }

    .notes-status {
      font-family: TeX Gyre Heros Condensed, sans-serif;
      font-size: 1.6em;
      color: #000;
      opacity: 0.6;
      margin: 0 0 1em;
    }

    @media screen and (max-width: 991px) {
      html, body { font-size: 1.25vw; }
    }
    @media screen and (max-width: 767px) {
      html, body { font-size: 2vw; }
      .notes-ticker-item { font-size: 8em; }
      .notes-item-link { font-size: 2.2em; }
      .notes-ticker-wrapper { padding-top: 7em; }
    }
    @media screen and (max-width: 479px) {
      html, body { font-size: 3.5vw; }
      .notes-page { padding: 1.5em 1.5em 8em; }
      .notes-ticker-item { font-size: 7.62em; }
      .notes-item-link { font-size: 1.8em; }
      .notes-nav { padding: .76em; }
      .notes-ticker-wrapper { padding-top: 5em; }
    }
  </style>
</head>

  <script>
    (function () {
      var status = document.getElementById('notes-status');
      var list = document.getElementById('notes-list');

      function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      fetch('https://api.buttondown.email/v1/emails?status=sent', {
        headers: {
          'Authorization': 'Token 0ce51b9d-cafe-4728-80a4-880ee408f0de'
        }
      })
      .then(function(res) {
        if (!res.ok) throw new Error('API error: ' + res.status);
        return res.json();
      })
      .then(function(data) {
        status.style.display = 'none';
        var emails = data.results || data;
        if (!emails || emails.length === 0) {
          status.style.display = '';
          status.textContent = 'No notes yet.';
          return;
        }
        emails.forEach(function(email) {
          var li = document.createElement('li');
          li.className = 'notes-item';

          var date = document.createElement('div');
          date.className = 'notes-item-date';
          date.textContent = formatDate(email.publish_date || email.creation_date);

          var link = document.createElement('a');
          link.className = 'notes-item-link';
          link.href = email.absolute_url || ('https://buttondown.email/littlebusiness/archive/' + email.slug);
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = email.subject;

          li.appendChild(date);
          li.appendChild(link);
          list.appendChild(li);
        });
      })
      .catch(function(err) {
        status.textContent = 'Couldn\'t load notes right now. Try again later.';
        console.error(err);
      });
    })();
  </script>
