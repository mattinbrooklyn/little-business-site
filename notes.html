<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Notes — Little Business</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/webflow.css" rel="stylesheet" type="text/css">
  <link href="css/little-business-2.webflow.css" rel="stylesheet" type="text/css">
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.png" rel="apple-touch-icon">
  <style>
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      -webkit-tap-highlight-color: transparent;
    }
    a { color: inherit; text-decoration: inherit; font-size: inherit; }
    .w-webflow-badge { display: none !important; }

    html, body {
      margin: 0;
      padding: 0;
      background-color: #f7f0cb;
      min-height: 100vh;
      font-size: 1vw;
      font-family: TeX Gyre Heros Condensed, sans-serif;
      line-height: 1.1;
      color: #000;
    }

    /* ---- Nav ---- */
    .notes-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.32em;
      background: transparent;
    }
    .notes-nav-left {
      display: flex;
      flex-direction: column;
      gap: .5em;
    }
    .notes-nav-link {
      text-transform: uppercase;
      font-family: TeX Gyre Heros Condensed, sans-serif;
      font-size: .99em;
      line-height: 1.13;
      display: block;
      color: #000;
      text-decoration: none;
    }
    .notes-nav-link.is-current {
      font-style: italic;
    }
    .notes-nav-right {
      text-align: right;
    }

    /* ---- Logo: centered text in nav ---- */
    .notes-logo-center {
      position: absolute;
      top: 1.32em;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      white-space: nowrap;
    }
    .notes-logo-center a {
      font-family: TeX Gyre Heros Condensed, sans-serif;
      font-size: .99em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #000;
      text-decoration: none;
      line-height: 1.13;
    }

    /* ---- Ticker banner ---- */
    .notes-ticker-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      overflow: hidden;
      background: #f7f0cb;
      padding-top: 10em;
      padding-bottom: 1em;
    }
    .notes-ticker-track {
      display: flex;
      width: max-content;
      animation: notes-ticker 18s linear infinite;
    }
    .notes-ticker-track:hover {
      animation-play-state: paused;
    }
    .notes-ticker-item {
      font-family: Larish Alte, sans-serif;
      font-size: 16.53em;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      padding-right: .25em;
      color: #000;
    }
    @keyframes notes-ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ---- List content ---- */
    .notes-page {
      padding: 2em 3em 10em;
      max-width: 100%;
      box-sizing: border-box;
    }

    .notes-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .notes-item {
      border-top: 2px solid #000;
      padding: 1em 0;
      display: flex;
      flex-direction: column;
      gap: .3em;
    }

    .notes-item:last-child {
      border-bottom: 2px solid #000;
    }

    .notes-item-date {
      font-family: TeX Gyre Heros Condensed, sans-serif;
      font-size: 1em;
      color: #000;
      opacity: 0.6;
      line-height: 1.1;
    }

    .notes-item-link {
      font-family: ITC Garamond Std, sans-serif;
      font-size: 3.2em;
      font-weight: 400;
      line-height: 1;
      color: #000;
      text-decoration: none;
    }

    .notes-item-link:hover {
      text-decoration: underline;
    }

    .notes-status {
      font-family: TeX Gyre Heros Condensed, sans-serif;
      font-size: 1.6em;
      color: #000;
      opacity: 0.6;
      margin: 0 0 1em;
    }

    @media screen and (max-width: 991px) {
      html, body { font-size: 1.25vw; }
    }
    @media screen and (max-width: 767px) {
      html, body { font-size: 2vw; }
      .notes-ticker-item { font-size: 8em; }
      .notes-item-link { font-size: 2.2em; }
      .notes-ticker-wrapper { padding-top: 7em; }
    }
    @media screen and (max-width: 479px) {
      html, body { font-size: 3.5vw; }
      .notes-page { padding: 1.5em 1.5em 8em; }
      .notes-ticker-item { font-size: 7.62em; }
      .notes-item-link { font-size: 1.8em; }
      .notes-nav { padding: .76em; }
      .notes-ticker-wrapper { padding-top: 5em; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <div class="notes-nav">
    <div class="notes-nav-left">
      <a href="index.html#capabilities" class="notes-nav-link">CAPABILITIES</a>
      <a href="index.html#about-section" class="notes-nav-link">About</a>
      <a href="notes.html" class="notes-nav-link is-current">Notes</a>
    </div>
    <div class="notes-nav-right">
      <a href="index.html#Contact" class="notes-nav-link">Contact</a>
    </div>
  </div>

  <!-- Looping ticker heading -->
  <div class="notes-ticker-wrapper">
    <div class="notes-ticker-track" id="notes-ticker-track">
      <div class="notes-ticker-item">Notes&nbsp;</div>
      <div class="notes-ticker-item">Notes&nbsp;</div>
      <div class="notes-ticker-item">Notes&nbsp;</div>
      <div class="notes-ticker-item">Notes&nbsp;</div>
      <div class="notes-ticker-item">Notes&nbsp;</div>
      <div class="notes-ticker-item">Notes&nbsp;</div>
      <div class="notes-ticker-item">Notes&nbsp;</div>
      <div class="notes-ticker-item">Notes&nbsp;</div>
    </div>
  </div>

  <!-- List -->
  <div class="notes-page">
    <p class="notes-status" id="notes-status">Loading...</p>
    <ul class="notes-list" id="notes-list"></ul>
  </div>

  <!-- Logo: centered in nav -->
  <div class="notes-logo-center">
    <a href="index.html">Little Business</a>
  </div>

  <script>
    (function () {
      var status = document.getElementById('notes-status');
      var list = document.getElementById('notes-list');

      function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      fetch('https://api.buttondown.email/v1/emails?status=sent', {
        headers: {
          'Authorization': 'Token 0ce51b9d-cafe-4728-80a4-880ee408f0de'
        }
      })
      .then(function(res) {
        if (!res.ok) throw new Error('API error: ' + res.status);
        return res.json();
      })
      .then(function(data) {
        status.style.display = 'none';
        var emails = data.results || data;
        if (!emails || emails.length === 0) {
          status.style.display = '';
          status.textContent = 'No notes yet.';
          return;
        }
        emails.forEach(function(email) {
          var li = document.createElement('li');
          li.className = 'notes-item';

          var date = document.createElement('div');
          date.className = 'notes-item-date';
          date.textContent = formatDate(email.publish_date || email.creation_date);

          var link = document.createElement('a');
          link.className = 'notes-item-link';
          link.href = email.absolute_url || ('https://buttondown.email/littlebusiness/archive/' + email.slug);
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = email.subject;

          li.appendChild(date);
          li.appendChild(link);
          list.appendChild(li);
        });
      })
      .catch(function(err) {
        status.textContent = 'Couldn\'t load notes right now. Try again later.';
        console.error(err);
      });
    })();
  </script>

  <!-- Newsletter modal (same as index.html) -->
  <style>
    #lb-modal-card {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, calc(100vw - 40px));
      background: #f7f0cb;
      border: 2px solid #000;
      border-radius: .66em;
      padding: 1.4em 1em;
      box-sizing: border-box;
      z-index: 9999;
      pointer-events: none;
      bottom: -600px;
    }
    #lb-modal-card.lb-interactive {
      pointer-events: auto;
    }
    #lb-modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
      color: #000;
    }
    #lb-modal-heading {
      font-family: "ITC Garamond Std", sans-serif;
      font-size: 3.2em;
      font-weight: 400;
      line-height: 1;
      margin-top: 0;
      margin-bottom: .6em;
    }
    #lb-modal-form {
      display: flex;
    }
    #lb-modal-email {
      flex: 1;
      border: 1px solid #000;
      border-right: none;
      border-radius: 4px 0 0 4px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: "TeX Gyre Heros Condensed", sans-serif;
      text-transform: uppercase;
      background: transparent;
      outline: none;
      -webkit-appearance: none;
    }
    #lb-modal-email::placeholder {
      color: #666;
      font-family: "TeX Gyre Heros Condensed", sans-serif;
      text-transform: uppercase;
    }
    #lb-modal-submit {
      border: 1px solid #000;
      border-radius: 0 4px 4px 0;
      padding: 10px 20px;
      font-size: 14px;
      font-family: "TeX Gyre Heros Condensed", sans-serif;
      text-transform: uppercase;
      background: #000;
      color: #f7f0cb;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
  </style>

  <div id="lb-modal-card" role="dialog" aria-modal="true" aria-label="Keep in touch">
    <button id="lb-modal-close" aria-label="Close">&#x2715;</button>
    <h2 id="lb-modal-heading">Want to keep in touch?</h2>
    <div id="lb-modal-form">
      <input id="lb-modal-email" type="email" placeholder="your email">
      <button id="lb-modal-submit" type="button">Submit</button>
    </div>
  </div>

  <script>
    (function () {
      var card = document.getElementById('lb-modal-card');
      var closeBtn = document.getElementById('lb-modal-close');
      var dismissed = false;
      var travelPx = 300;
      var triggerY = 400; // start showing after 400px scroll

      function update() {
        if (dismissed) return;
        var scrollY = window.scrollY;
        var vh = window.innerHeight;
        var cardH = card.offsetHeight;
        var centeredBottom = (vh - cardH) / 2;
        var hiddenBottom = -cardH - 40;

        var extra = scrollY - triggerY;
        if (extra < 0) {
          card.style.bottom = hiddenBottom + 'px';
          card.classList.remove('lb-interactive');
        } else {
          var t = Math.min(1, extra / travelPx);
          var eased = 1 - Math.pow(1 - t, 3);
          card.style.bottom = (hiddenBottom + (centeredBottom - hiddenBottom) * eased) + 'px';
          if (t > 0) card.classList.add('lb-interactive');
          else card.classList.remove('lb-interactive');
        }
      }

      closeBtn.addEventListener('click', function () {
        dismissed = true;
        card.style.bottom = '-600px';
        card.classList.remove('lb-interactive');
      });

      var submitBtn = document.getElementById('lb-modal-submit');
      var emailInput = document.getElementById('lb-modal-email');
      var formDiv = document.getElementById('lb-modal-form');
      submitBtn.addEventListener('click', function () {
        var email = emailInput.value.trim();
        if (!email) return;
        submitBtn.disabled = true;
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://buttondown.com/api/emails/embed-subscribe/littlebusiness';
        form.target = 'bd-iframe';
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'email';
        input.value = email;
        form.appendChild(input);
        var embedInput = document.createElement('input');
        embedInput.type = 'hidden';
        embedInput.name = 'embed';
        embedInput.value = '1';
        form.appendChild(embedInput);
        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
        formDiv.innerHTML = '<p style="margin:0;font-size:.95em;">Thanks! TTYS \u003c3</p>';
      });
      var iframe = document.createElement('iframe');
      iframe.name = 'bd-iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);

      window.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update, { passive: true });
      update();
    })();
  </script>

</body>
</html>
